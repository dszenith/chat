<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Open Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <style>
        :root { --primary: #0084ff; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* Header */
        header { background: var(--primary); color: white; padding: 15px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        /* Chat Box */
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        
        /* Messaggi */
        .msg { max-width: 70%; padding: 10px 15px; border-radius: 18px; font-size: 14px; line-height: 1.4; position: relative; background: white; align-self: flex-start; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .msg.me { align-self: flex-end; background: var(--primary); color: white; }
        .msg-info { font-size: 10px; margin-bottom: 4px; opacity: 0.7; }

        /* Input Area */
        .input-area { background: white; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #ddd; }
        input { flex: 1; border: 1px solid #ddd; padding: 12px; border-radius: 25px; outline: none; }
        button { background: var(--primary); color: white; border: none; padding: 0 20px; border-radius: 25px; cursor: pointer; font-weight: bold; }
        
        /* Setup iniziale */
        #overlay { position: fixed; inset: 0; background: white; display: flex; align-items: center; justify-content: center; z-index: 100; }
        .modal { text-align: center; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div id="overlay">
        <div class="modal">
            <h2>🌍 Chat Globale Aperta</h2>
            <p>Inserisci un nome per iniziare</p>
            <input type="text" id="username" placeholder="Il tuo nome...">
            <br><br>
            <button onclick="startChat()">Entra nella Mischia</button>
        </div>
    </div>

    <header>
        <strong>Stanza Globale</strong> (P2P)
    </header>

    <div id="messages"></div>

    <div class="input-area">
        <input type="text" id="msgInput" placeholder="Scrivi un messaggio pubblico...">
        <button onclick="send()">Invia</button>
    </div>

    <script>
        // Collegamento ai nodi relay gratuiti di GunDB
        const gun = Gun([
            'https://gun-manhattan.herokuapp.com/gun',
            'https://p2p.xyz/gun'
        ]);

        let myName = "";
        const chatRoom = gun.get('global-chat-2024'); // Nodo unico per tutti

        function startChat() {
            const userBox = document.getElementById('username');
            if (!userBox.value) return alert("Scegli un nome!");
            myName = userBox.value;
            document.getElementById('overlay').style.display = 'none';
        }

        // Ascolta i nuovi messaggi
        chatRoom.map().on((data, id) => {
            if (data && data.text) {
                renderMessage(data);
            }
        });

        function send() {
            const input = document.getElementById('msgInput');
            if (!input.value) return;

            chatRoom.set({
                name: myName,
                text: input.value,
                time: Date.now()
            });

            input.value = '';
        }

        function renderMessage(data) {
            const messagesDiv = document.getElementById('messages');
            const isMe = data.name === myName;
            
            const msgEl = document.createElement('div');
            msgEl.className = `msg ${isMe ? 'me' : ''}`;
            
            msgEl.innerHTML = `
                <div class="msg-info">${data.name} • ${new Date(data.time).toLocaleTimeString()}</div>
                <div>${data.text}</div>
            `;
            
            messagesDiv.appendChild(msgEl);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // Invia premendo Invio
        document.getElementById('msgInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') send();
        });
    </script>
</body>
</html>
