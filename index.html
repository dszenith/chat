<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CHATNITH</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" type="image/png" href="./logo.png">

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW error:', err));
            });
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        [x-cloak] { display: none !important; }
        body { background: #020617; overflow: hidden; font-family: 'Inter', sans-serif; height: 100dvh; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .glossy {
            position: relative; overflow: hidden;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%);
            backdrop-filter: blur(5px);
        }
        .glossy::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg); animation: shimmer 4s infinite;
        }
        @keyframes shimmer {
            0% { transform: translateX(-150%) rotate(45deg); }
            100% { transform: translateX(150%) rotate(45deg); }
        }

        .msg-pop { animation: popEnfatizzato 0.3s ease-out forwards; }
        @keyframes popEnfatizzato {
            0% { opacity: 0; transform: translateY(10px) scale(0.98); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .neon-text { font-weight: 900; filter: drop-shadow(0 0 5px currentColor); }
        .my-neon-name { color: #22d3ee; text-shadow: 0 0 10px rgba(34, 211, 238, 0.8); font-weight: 900; }
        .highlight-followed { border: 2px solid #fbbf24 !important; box-shadow: 0 0 15px rgba(251, 191, 36, 0.3); }
    </style>
</head>
<body class="text-slate-200" x-data="socialApp()" x-init="init()">

    <audio id="snd-pop" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3" preload="auto"></audio>
    <audio id="snd-send" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3" preload="auto"></audio>

    <div x-cloak class="flex h-[100dvh] w-full overflow-hidden bg-slate-950">
        
        <aside class="w-16 md:w-20 bg-slate-950 border-r border-white/5 flex flex-col items-center py-4 gap-4 z-20 overflow-y-auto no-scrollbar">
            <img src="./logo.png" class="w-8 h-8 md:w-10 md:h-10 mb-2 object-contain" alt="Logo">
            
            <button @click="activeTarget = 'global'" 
                    class="w-10 h-10 md:w-12 md:h-12 rounded-xl flex items-center justify-center transition-all cursor-pointer shrink-0"
                    :class="activeTarget === 'global' ? 'bg-cyan-500 text-white shadow-lg shadow-cyan-500/40' : 'bg-slate-800 text-slate-500 hover:bg-slate-700'">
                <span class="font-black text-[10px]">ALL</span>
            </button>
            <div class="w-8 h-px bg-white/10 shrink-0"></div>
            
            <template x-for="contact in following" :key="contact">
                <div class="relative group shrink-0">
                    <button @click="activeTarget = contact" class="w-10 h-10 md:w-12 md:h-12 rounded-full flex items-center justify-center font-black text-white text-sm md:text-lg transition-all hover:scale-110"
                             :style="'background:' + getUserColor(contact)"
                             :class="activeTarget === contact ? 'ring-2 ring-cyan-400 ring-offset-4 ring-offset-slate-950' : 'opacity-70'">
                        <span x-text="contact.substring(0,1).toUpperCase()"></span>
                    </button>
                    <button @click.stop="unfollow(contact)" class="absolute -top-1 -left-1 w-5 h-5 bg-red-600 rounded-full flex items-center justify-center border-2 border-slate-950 opacity-0 group-hover:opacity-100 transition-opacity">
                        <span class="text-[10px] text-white font-black">×</span>
                    </button>
                </div>
            </template>
        </aside>

        <main class="flex-1 flex flex-col bg-slate-900/10">
            <header class="h-16 flex items-center justify-between px-4 md:px-8 glass shrink-0">
                <div class="flex items-center gap-4">
                    <h1 class="text-lg md:text-xl font-black text-white italic tracking-tighter flex items-center gap-2 uppercase">
                        <span class="text-cyan-500">#</span>
                        <span x-text="activeTarget"></span>
                    </h1>
                    <template x-if="activeTarget !== 'global' && !following.includes(activeTarget) && activeTarget !== username">
                        <button @click="toggleFollow(activeTarget)" class="bg-yellow-500 text-black text-[9px] font-black px-3 py-1 rounded hover:bg-yellow-400 transition-colors cursor-pointer uppercase">
                            Follow
                        </button>
                    </template>
                </div>
                
                <div class="flex items-center gap-3">
                    <div class="hidden md:block bg-cyan-500/10 text-cyan-400 border border-cyan-500/20 px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest" x-text="username"></div>
                    <button @click="logout" class="p-2 text-slate-500 hover:text-red-500 transition-colors">
                        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
                    </button>
                </div>
            </header>

            <div id="chat-box" class="flex-1 overflow-y-auto p-4 md:p-8 space-y-6 no-scrollbar">
                <template x-for="msg in filteredMessages" :key="msg.id">
                    <div x-show="!deletedLocal.includes(msg.id)" :class="msg.username === username ? 'items-end' : 'items-start'" class="flex flex-col group msg-pop">
                        <div class="flex items-center gap-2 mb-1 px-1" :class="msg.username === username ? 'flex-row-reverse' : 'flex-row'">
                            <span :class="msg.username === username ? 'my-neon-name' : 'neon-text'" 
                                  class="text-[11px] uppercase cursor-pointer"
                                  :style="msg.username !== username ? 'color:' + getUserColor(msg.username) : ''"
                                  @click="activeTarget = msg.username"
                                  x-text="msg.username === username ? 'YOU' : msg.username"></span>
                            
                            <button @click="msg.username === username ? deleteMsg(msg.id) : deleteForMe(msg.id)" 
                                    class="opacity-0 group-hover:opacity-100 transition-opacity text-slate-600 hover:text-red-500 px-1">
                                <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                            </button>
                        </div>

                        <div class="flex items-end gap-3 max-w-[90%] md:max-w-[70%]" :class="msg.username === username ? 'flex-row-reverse' : 'flex-row'">
                            <div :class="{
                                    'bg-cyan-600/30 border-cyan-400/40 text-white': msg.username === username,
                                    'bg-slate-800/40 border-white/10 text-slate-100': msg.username !== username,
                                    'highlight-followed': activeTarget === 'global' && following.includes(msg.username) && msg.username !== username
                                 }"
                                 class="px-5 py-3 text-sm border rounded-2xl glossy"
                                 :style="msg.username === username ? 'border-top-right-radius: 2px;' : 'border-top-left-radius: 2px;'">
                                <span x-text="msg.content" class="leading-relaxed break-words"></span>
                            </div>
                            <span class="text-[9px] text-slate-600 font-bold mb-1 tabular-nums" x-text="formatTime(msg.created_at)"></span>
                        </div>
                    </div>
                </template>
            </div>

            <footer class="p-4 md:p-6 bg-slate-950/80 backdrop-blur-xl border-t border-white/5 shrink-0">
                <div class="max-w-4xl mx-auto flex items-center bg-slate-900 border border-white/10 rounded-2xl p-1.5 focus-within:border-cyan-500/50 transition-all shadow-2xl">
                    <input x-model="newMsg" @keyup.enter="triggerSend($event)" type="text" placeholder="Scrivi un messaggio..." 
                           class="flex-1 bg-transparent border-none outline-none px-4 text-sm text-slate-200">
                    <button @click="triggerSend($event)" class="bg-cyan-500 hover:bg-cyan-400 text-white w-12 h-12 rounded-xl flex items-center justify-center transition-all cursor-pointer shadow-lg active:scale-95">
                        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path d="M5 10l7-7m0 0l7 7m-7-7v18" /></svg>
                    </button>
                </div>
            </footer>
        </main>
    </div>

    <template x-if="!isLoggedIn">
        <div class="fixed inset-0 bg-slate-950 z-[100] flex items-center justify-center p-6">
            <div class="w-full max-w-sm space-y-8 text-center">
                <img src="./logo.png" class="w-20 h-20 mx-auto mb-4 object-contain animate-pulse">
                <h2 class="text-6xl font-black text-white italic tracking-tighter uppercase">CHATNITH</h2>
                <div class="bg-slate-900 border border-white/5 p-8 rounded-[40px] shadow-2xl space-y-4">
                    <input x-model="auth.nick" type="text" placeholder="NICKNAME" class="w-full p-4 bg-slate-950 border border-white/10 rounded-2xl text-white outline-none focus:border-cyan-500 uppercase font-bold">
                    <input x-model="auth.pass" type="password" placeholder="PASSWORD" class="w-full p-4 bg-slate-950 border border-white/10 rounded-2xl text-white outline-none focus:border-cyan-500 font-bold">
                    <button @click="handleAuth" class="w-full bg-cyan-600 hover:bg-cyan-500 p-5 rounded-2xl font-black text-sm cursor-pointer uppercase tracking-widest transition-all">ENTRA NELL'INTERFACCIA</button>
                </div>
            </div>
        </div>
    </template>

    <script>
        function socialApp() {
            const SB_URL = 'https://aarpqxnoskyzmliqpaor.supabase.co'; 
            const SB_KEY = 'sb_publishable_eA6TYstP3koJVbkHdDmc7A_07e7zV2r'; 
            const supabase = window.supabase.createClient(SB_URL, SB_KEY);

            return {
                username: '', isLoggedIn: false, auth: { nick: '', pass: '' },
                newMsg: '', messages: [], activeTarget: 'global', following: [],
                deletedLocal: [],

                init() {
                    const saved = JSON.parse(localStorage.getItem('_chatnith_user'));
                    if(saved) {
                        this.username = saved.nick;
                        this.following = saved.following || [];
                        this.isLoggedIn = true;
                        this.deletedLocal = JSON.parse(localStorage.getItem('_chatnith_del_' + this.username)) || [];
                        this.startChat();
                    }
                },

                triggerSend(e) {
                    if(!this.newMsg.trim()) return;
                    this.send();
                },

                async handleAuth() {
                    const nick = this.auth.nick.trim().toLowerCase();
                    if(!nick || !this.auth.pass) return;
                    const { data } = await supabase.from('users_profiles').select('*').eq('nickname', nick).single();
                    if(!data) {
                        await supabase.from('users_profiles').insert([{ nickname: nick, password: this.auth.pass, following: [] }]);
                        this.login({nickname: nick, following: []});
                    } else if(data.password === this.auth.pass) {
                        this.login(data);
                    } else {
                        alert("Password errata!");
                    }
                },

                login(user) {
                    this.username = user.nickname;
                    this.following = user.following || [];
                    this.saveLocal();
                    this.isLoggedIn = true;
                    this.deletedLocal = JSON.parse(localStorage.getItem('_chatnith_del_' + this.username)) || [];
                    this.startChat();
                },

                saveLocal() {
                    localStorage.setItem('_chatnith_user', JSON.stringify({nick: this.username, following: this.following}));
                },

                async toggleFollow(target) {
                    if(!this.following.includes(target)) {
                        this.following.push(target);
                        await supabase.from('users_profiles').update({ following: this.following }).eq('nickname', this.username);
                        this.saveLocal();
                    }
                },

                async unfollow(target) {
                    this.following = this.following.filter(f => f !== target);
                    if(this.activeTarget === target) this.activeTarget = 'global';
                    await supabase.from('users_profiles').update({ following: this.following }).eq('nickname', this.username);
                    this.saveLocal();
                },

                async send() {
                    document.getElementById('snd-send').currentTime = 0;
                    document.getElementById('snd-send').play().catch(()=>{});
                    const m = { username: this.username, content: this.newMsg, to_user: this.activeTarget === 'global' ? null : this.activeTarget };
                    await supabase.from('messages').insert([m]);
                    this.newMsg = '';
                },

                async deleteMsg(id) {
                    if(confirm("Eliminare il messaggio per tutti?")) {
                        await supabase.from('messages').delete().eq('id', id);
                    }
                },

                deleteForMe(id) {
                    this.deletedLocal.push(id);
                    localStorage.setItem('_chatnith_del_' + this.username, JSON.stringify(this.deletedLocal));
                },

                async startChat() {
                    const { data } = await supabase.from('messages').select('*').order('created_at', { ascending: false }).limit(150);
                    this.messages = (data || []).reverse(); this.scroll();
                    supabase.channel('messages').on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, p => {
                        if (p.eventType === 'INSERT') {
                            this.messages.push(p.new);
                            if(p.new.username !== this.username) {
                                document.getElementById('snd-pop').currentTime = 0;
                                document.getElementById('snd-pop').play().catch(()=>{});
                            }
                        }
                        if (p.eventType === 'DELETE') {
                            this.messages = this.messages.filter(m => m.id !== p.old.id);
                        }
                        this.scroll();
                    }).subscribe();
                },

                getUserColor(n) { 
                    let h = 0; for (let i = 0; i < n.length; i++) h = n.charCodeAt(i) + ((h << 5) - h); 
                    return ['#22d3ee', '#a78bfa', '#f472b6', '#fbbf24', '#34d399', '#818cf8', '#fb7185'][Math.abs(h) % 7]; 
                },
                formatTime(t) { return new Date(t).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); },
                get filteredMessages() {
                    let base = this.activeTarget === 'global' 
                        ? this.messages.filter(m => !m.to_user)
                        : this.messages.filter(m => (m.username === this.username && m.to_user === this.activeTarget) || (m.username === this.activeTarget && m.to_user === this.username));
                    return base;
                },
                scroll() { this.$nextTick(() => { const b = document.getElementById('chat-box'); if(b) b.scrollTop = b.scrollHeight; }); },
                logout() { localStorage.removeItem('_chatnith_user'); location.reload(); }
            }
        }
    </script>
</body>
</html>
