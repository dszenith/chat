<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CHATNITH</title>
    <link rel="icon" type="image/png" href="logo.png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        [x-cloak] { display: none !important; }
        body { background-color: #0b1120; overflow: hidden; }
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .bg-chat { background: radial-gradient(circle at top, #1e293b 0%, #0b1120 100%); }
        
        /* Animazioni Enfatizzate */
        .msg-pop { animation: msg-in 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes msg-in { 
            0% { opacity: 0; transform: translateY(15px) scale(0.9); } 
            100% { opacity: 1; transform: translateY(0) scale(1); } 
        }

        /* Particelle */
        .particle {
            position: fixed; pointer-events: none; opacity: 0;
            width: 4px; height: 4px; border-radius: 50%;
            animation: particle-fly 0.6s ease-out forwards;
        }
        @keyframes particle-fly {
            0% { opacity: 1; transform: translate(0,0); }
            100% { opacity: 0; transform: translate(var(--tw-x), var(--tw-y)); }
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-target { border: 2px solid #22d3ee; box-shadow: 0 0 15px rgba(34, 211, 238, 0.3); }
    </style>
</head>
<body class="text-slate-100 antialiased font-sans" x-data="chatApp()" x-init="init()">

    <audio id="snd-in" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3" preload="auto"></audio>
    <audio id="snd-out" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3" preload="auto"></audio>
    <audio id="snd-type" src="https://www.zapsplat.com/wp-content/uploads/2015/sound-effects-one/office_typing_single_key_press_001.mp3" preload="auto"></audio>

    <div x-cloak class="flex h-[100dvh] w-full max-w-6xl mx-auto border-x border-slate-800 shadow-2xl overflow-hidden relative">
        
        <aside class="w-20 bg-[#0f172a] border-r border-slate-800 flex flex-col items-center py-4 gap-3 z-20 overflow-y-auto no-scrollbar">
            <button @click="activeTarget = 'global'" :class="activeTarget === 'global' ? 'active-target opacity-100' : 'opacity-40'"
                    class="w-11 h-11 rounded-xl bg-slate-800 flex items-center justify-center transition-all">
                <span class="text-[9px] font-black text-cyan-400 italic">ALL</span>
            </button>
            <div class="w-6 h-[1px] bg-slate-800"></div>
            <template x-for="contact in recentContacts" :key="contact">
                <button @click="activeTarget = contact" :class="activeTarget === contact ? 'active-target opacity-100' : 'opacity-60'"
                        class="w-11 h-11 rounded-full flex items-center justify-center font-bold text-white uppercase transition-all"
                        :style="'background:' + getUserColor(contact)">
                    <span x-text="contact.substring(0,1)"></span>
                </button>
            </template>
        </aside>

        <div class="flex-1 flex flex-col bg-chat relative">
            <header class="p-3 border-b border-slate-800 flex justify-between items-center bg-[#0f172a]/95 backdrop-blur-md z-10">
                <div class="flex items-center gap-3">
                    <img src="logo.png" alt="Logo" class="h-8 w-auto object-contain">
                    <div>
                        <h1 class="font-black text-lg text-cyan-400 uppercase italic tracking-tighter" x-text="activeTarget === 'global' ? 'CHATNITH' : activeTarget"></h1>
                        <div class="flex items-center gap-1">
                            <div :class="isConnected ? 'bg-green-500' : 'bg-red-500'" class="w-1.5 h-1.5 rounded-full"></div>
                            <span class="text-[8px] text-slate-500 uppercase font-bold" x-text="isConnected ? 'Live' : 'Disc.'"></span>
                        </div>
                    </div>
                </div>
                <div class="bg-cyan-500/10 px-2 py-0.5 rounded-md border border-cyan-500/20">
                    <span class="text-[10px] font-bold text-cyan-400" x-text="username"></span>
                </div>
            </header>

            <div id="chat-box" class="flex-1 overflow-y-auto p-3 space-y-2 scroll-smooth">
                <template x-for="msg in filteredMessages" :key="msg.id">
                    <div :class="msg.username === username ? 'items-end' : 'items-start'" class="flex flex-col group msg-pop">
                        <span class="text-[8px] font-bold tracking-widest uppercase mb-0.5 px-1 opacity-70" 
                              :style="'color:' + getUserColor(msg.username)" x-text="msg.username === username ? 'YOU' : msg.username"></span>
                        
                        <div class="flex items-end gap-1.5 max-w-[85%]">
                            <div :class="msg.username === username ? 'bg-cyan-600 text-white rounded-l-xl rounded-tr-xl' : 'bg-slate-800 text-slate-200 rounded-r-xl rounded-tl-xl border border-slate-700'"
                                 class="px-3 py-1.5 shadow-lg text-sm transition-all hover:brightness-110">
                                <span x-text="msg.content"></span>
                            </div>
                            <span class="text-[7px] text-slate-600 font-bold mb-1" x-text="formatTime(msg.created_at)"></span>
                        </div>
                    </div>
                </template>
            </div>

            <div class="p-3 bg-slate-900/90 border-t border-slate-800">
                <div class="flex items-center bg-[#0b1120] rounded-xl border border-slate-700 focus-within:border-cyan-500 p-1 shadow-inner">
                    <input x-model="newMsg" @input="playTypeSound($event)" @keyup.enter="send" type="text" 
                           placeholder="Scrivi qui..." class="flex-1 p-3 bg-transparent outline-none text-sm text-white">
                    <button @click="send" id="btn-send" class="p-3 bg-cyan-600 text-white rounded-lg hover:bg-cyan-500 active:scale-90 transition-all">
                        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 12h14M12 5l7 7-7 7"/></svg>
                    </button>
                </div>
            </div>
        </div>

        <template x-if="!usernameSet">
            <div class="fixed inset-0 bg-[#0b1120] z-[100] flex items-center justify-center p-6">
                <div class="w-full max-w-xs space-y-4 text-center">
                    <h2 class="text-3xl font-black text-white italic tracking-tighter uppercase">CHATNITH</h2>
                    <input x-model="tempName" @keyup.enter="lockUsername" type="text" placeholder="NICKNAME" 
                           class="w-full p-4 bg-slate-900 border-2 border-slate-800 rounded-xl focus:border-cyan-500 outline-none text-center font-bold text-white uppercase tracking-widest">
                    <button @click="lockUsername" class="w-full bg-cyan-600 p-4 rounded-xl font-black text-white uppercase tracking-widest active:scale-95 transition-all shadow-xl shadow-cyan-900/20">ENTRA</button>
                </div>
            </div>
        </template>
    </div>

    <script>
        function chatApp() {
            const SB_URL = 'https://aarpqxnoskyzmliqpaor.supabase.co'; 
            const SB_KEY = 'sb_publishable_eA6TYstP3koJVbkHdDmc7A_07e7zV2r'; 
            const supabase = window.supabase.createClient(SB_URL, SB_KEY);

            return {
                username: '', tempName: '', usernameSet: false, 
                newMsg: '', messages: [], isConnected: false,
                activeTarget: 'global',

                init() {
                    const saved = localStorage.getItem('_chatnith_uid');
                    if(saved) { this.username = saved; this.usernameSet = true; this.startChat(); }
                },

                playTypeSound(e) {
                    const snd = document.getElementById('snd-type');
                    const clone = snd.cloneNode(); // Permette sovrapposizione suoni
                    clone.volume = 0.1;
                    clone.playbackRate = 1.2 + Math.random() * 0.5; // Variazione lo-fi
                    clone.play().catch(()=>{});
                },

                createParticles(x, y, color) {
                    for(let i=0; i<12; i++) {
                        const p = document.createElement('div');
                        p.className = 'particle';
                        p.style.left = x + 'px';
                        p.style.top = y + 'px';
                        p.style.background = color;
                        const tx = (Math.random() - 0.5) * 150;
                        const ty = (Math.random() - 0.5) * 150;
                        p.style.setProperty('--tw-x', `${tx}px`);
                        p.style.setProperty('--tw-y', `${ty}px`);
                        document.body.appendChild(p);
                        setTimeout(() => p.remove(), 600);
                    }
                },

                async send() {
                    if(!this.newMsg.trim()) return;
                    
                    // Effetto particelle sul bottone
                    const btn = document.getElementById('btn-send').getBoundingClientRect();
                    this.createParticles(btn.left + btn.width/2, btn.top + btn.height/2, '#22d3ee');

                    const msg = { 
                        username: this.username, 
                        content: this.newMsg, 
                        to_user: this.activeTarget === 'global' ? null : this.activeTarget 
                    };
                    this.newMsg = '';
                    document.getElementById('snd-out').play().catch(()=>{});
                    await supabase.from('messages').insert([msg]);
                },

                async startChat() {
                    const { data } = await supabase.from('messages').select('*').order('created_at', { ascending: false }).limit(100);
                    this.messages = (data || []).reverse();
                    this.scroll();

                    supabase.channel('public')
                        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                            this.messages.push(payload.new);
                            if (payload.new.username !== this.username) {
                                document.getElementById('snd-in').play().catch(()=>{});
                            }
                            this.scroll();
                        }).subscribe(s => this.isConnected = (s === 'SUBSCRIBED'));
                },

                formatTime(t) { return new Date(t).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); },
                getUserColor(n) {
                    let hash = 0; for (let i = 0; i < n.length; i++) hash = n.charCodeAt(i) + ((hash << 5) - hash);
                    return ['#22d3ee', '#818cf8', '#fb7185', '#34d399', '#fbbf24'][Math.abs(hash) % 5];
                },
                get filteredMessages() {
                    if (this.activeTarget === 'global') return this.messages.filter(m => !m.to_user);
                    return this.messages.filter(m => (m.username === this.username && m.to_user === this.activeTarget) || (m.username === this.activeTarget && m.to_user === this.username));
                },
                get recentContacts() {
                    const c = new Set();
                    this.messages.forEach(m => { if(m.to_user) c.add(m.username === this.username ? m.to_user : m.username); });
                    return Array.from(c);
                },
                lockUsername() {
                    if(this.tempName.trim().length < 2) return;
                    this.username = this.tempName.trim();
                    localStorage.setItem('_chatnith_uid', this.username);
                    this.usernameSet = true;
                    this.startChat();
                },
                scroll() { this.$nextTick(() => { const b = document.getElementById('chat-box'); b.scrollTop = b.scrollHeight; }); }
            }
        }
    </script>
</body>
</html>
